<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression Calculator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .app-container {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #0f172a;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.75rem;
        }
        h2 {
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #1e293b;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.5rem;
        }
        .input-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: inline-block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 0.5rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #1e293b;
            background-color: #ffffff;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .button-group {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        button {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            color: #334155;
        }
        button:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }
        button:active {
            transform: scale(0.97);
        }
        #btnSubmit {
            background-color: #3b82f6;
            border-color: #2563eb;
            color: #ffffff;
        }
        #btnSubmit:hover {
            background-color: #2563eb;
            border-color: #1d4ed8;
        }
        #btnVisualise {
            background-color: #10b981;
            border-color: #059669;
            color: #ffffff;
        }
        #btnVisualise:hover {
            background-color: #059669;
            border-color: #047857;
        }
        #errorDisplay {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            color: #b91c1c;
            font-size: 0.9rem;
            font-weight: bold;
            display: none;
        }
        .results-display p {
            margin: 0.75rem 0;
            font-size: 0.95rem;
            color: #334155;
        }
        .equation-box {
            font-family: monospace;
            background-color: #f1f5f9;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #0f172a;
        }
        .metric-highlight {
            font-weight: 600;
            color: #0f172a;
        }
        #metricsGraphContainer {
            margin-top: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.5rem;
            background-color: #ffffff;
            max-width: 100%;
            box-sizing: border-box;
            display: none;
        }
        #metricsGraphImg {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        #metricsGraphFallback {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 6px;
            color: #b45309;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Regression Calculator</h1>
        <div class="input-group">
            <label for="xInput">X Values (comma-separated):</label>
            <input type="text" id="xInput" placeholder="e.g. 1, 2, 3, 4, 5">
        </div>
        <div class="input-group">
            <label for="yInput">Y Values (comma-separated):</label>
            <input type="text" id="yInput" placeholder="e.g. 2, 4, 5, 4, 5">
        </div>
        <div class="button-group">
            <button id="btnSubmit">Submit</button>
            <button id="btnReset">Reset</button>
            <button id="btnVisualise">Visualise</button>
        </div>
        <div id="errorDisplay"></div>
        <h2>Results</h2>
        <div class="results-display">
            <p><strong>Equation:</strong> <span id="eqDisplay" class="equation-box">—</span></p>
            <p><strong>Mean Absolute Error (MAE):</strong> <span id="maeVal" class="metric-highlight">—</span></p>
            <p><strong>Mean Squared Error (MSE):</strong> <span id="mseVal" class="metric-highlight">—</span></p>
            <p><strong>Root Mean Squared Error (RMSE):</strong> <span id="rmseVal" class="metric-highlight">—</span></p>
            <p><strong>R-squared (R²):</strong> <span id="r2Val" class="metric-highlight">—</span></p>
        </div>
        <h2>Visualization</h2>
        <div id="metricsGraphContainer">
            <img id="metricsGraphImg" alt="Regression and Evaluation Dashboard" />
        </div>
        <div id="metricsGraphFallback">
            The Matplotlib visualization is only generated and served when running via the Python Flask server.
        </div>
    </div>
    <script>
        const xInput = document.getElementById('xInput');
        const yInput = document.getElementById('yInput');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnReset = document.getElementById('btnReset');
        const btnVisualise = document.getElementById('btnVisualise');
        const errorDisplay = document.getElementById('errorDisplay');
        const eqDisplay = document.getElementById('eqDisplay');
        const maeVal = document.getElementById('maeVal');
        const mseVal = document.getElementById('mseVal');
        const rmseVal = document.getElementById('rmseVal');
        const r2Val = document.getElementById('r2Val');
        const metricsGraphContainer = document.getElementById('metricsGraphContainer');
        const metricsGraphImg = document.getElementById('metricsGraphImg');
        const metricsGraphFallback = document.getElementById('metricsGraphFallback');
        let calculatedState = null;
        btnSubmit.addEventListener('click', () => calculateResults(false));
        btnReset.addEventListener('click', resetAll);
        btnVisualise.addEventListener('click', visualiseResults);
        xInput.addEventListener('input', () => { calculatedState = null; });
        yInput.addEventListener('input', () => { calculatedState = null; });
        function showError(msg) {
            errorDisplay.textContent = msg;
            errorDisplay.style.display = 'block';
        }
        function hideError() {
            errorDisplay.textContent = '';
            errorDisplay.style.display = 'none';
        }
        function parseInputs() {
            hideError();
            const rawX = xInput.value.trim();
            const rawY = yInput.value.trim();
            if (!rawX || !rawY) {
                throw new Error("Please enter both X and Y values.");
            }
            const x = rawX.split(',').map(s => s.trim()).filter(s => s !== '').map(Number);
            const y = rawY.split(',').map(s => s.trim()).filter(s => s !== '').map(Number);
            if (x.some(isNaN) || y.some(isNaN)) {
                throw new Error("Inputs must contain only valid numbers separated by commas.");
            }
            if (x.length !== y.length) {
                throw new Error(`Length mismatch: X has ${x.length} values, Y has ${y.length} values.`);
            }
            if (x.length === 0) {
                throw new Error("Arrays cannot be empty.");
            }
            return { x, y };
        }
        async function calculateResults(showGraph = false) {
            try {
                hideError();
                const { x, y } = parseInputs();
                if (window.location.protocol.startsWith('http')) {
                    try {
                        const response = await fetch('/calculate', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ x, y })
                        });
                        const data = await response.json();
                        if (data.status === 'error') {
                            throw new Error(data.message);
                        }
                        const m = data.m;
                        const c = data.c;
                        const cSign = c >= 0 ? '+' : '-';
                        eqDisplay.textContent = `y = ${m.toFixed(4)}x ${cSign} ${Math.abs(c).toFixed(4)}`;
                        maeVal.textContent = data.mae.toFixed(6);
                        mseVal.textContent = data.mse.toFixed(6);
                        rmseVal.textContent = data.rmse.toFixed(6);
                        r2Val.textContent = isFinite(data.r_squared) ? data.r_squared.toFixed(6) : "—";
                        if (data.metrics_graph) {
                            metricsGraphImg.src = `data:image/png;base64,${data.metrics_graph}`;
                            if (showGraph === true) {
                                metricsGraphContainer.style.display = 'block';
                                metricsGraphFallback.style.display = 'none';
                            } else {
                                metricsGraphContainer.style.display = 'none';
                                metricsGraphFallback.style.display = 'none';
                            }
                        } else {
                            metricsGraphContainer.style.display = 'none';
                            if (showGraph === true) {
                                metricsGraphFallback.style.display = 'block';
                            } else {
                                metricsGraphFallback.style.display = 'none';
                            }
                        }
                        calculatedState = { x, y, m, c };
                        return;
                    } catch (e) {
                        console.warn("Python backend request failed, falling back to local JS calculation:", e);
                    }
                }
                metricsGraphContainer.style.display = 'none';
                if (showGraph === true) {
                    metricsGraphFallback.style.display = 'block';
                } else {
                    metricsGraphFallback.style.display = 'none';
                }
                const n = x.length;
                const meanX = x.reduce((a, b) => a + b, 0) / n;
                const meanY = y.reduce((a, b) => a + b, 0) / n;
                let numerator = 0;
                let denominator = 0;
                for (let i = 0; i < n; i++) {
                    numerator += (x[i] - meanX) * (y[i] - meanY);
                    denominator += Math.pow(x[i] - meanX, 2);
                }
                if (denominator === 0) {
                    throw new Error("Cannot calculate regression slope (all X values are identical).");
                }
                const m = numerator / denominator;
                const c = meanY - (m * meanX);
                const yPred = x.map(val => m * val + c);
                let absErrSum = 0;
                let sqErrSum = 0;
                let totVarSum = 0;
                for (let i = 0; i < n; i++) {
                    const diff = y[i] - yPred[i];
                    absErrSum += Math.abs(diff);
                    sqErrSum += Math.pow(diff, 2);
                    totVarSum += Math.pow(y[i] - meanY, 2);
                }
                const mae = absErrSum / n;
                const mse = sqErrSum / n;
                const rmse = Math.sqrt(mse);
                let r2;
                if (totVarSum === 0) {
                    r2 = sqErrSum === 0 ? 1.0 : -Infinity;
                } else {
                    r2 = 1.0 - (sqErrSum / totVarSum);
                }
                const cSign = c >= 0 ? '+' : '-';
                eqDisplay.textContent = `y = ${m.toFixed(4)}x ${cSign} ${Math.abs(c).toFixed(4)}`;
                maeVal.textContent = mae.toFixed(6);
                mseVal.textContent = mse.toFixed(6);
                rmseVal.textContent = rmse.toFixed(6);
                r2Val.textContent = isFinite(r2) ? r2.toFixed(6) : "—";
                calculatedState = { x, y, m, c };
            } catch (err) {
                showError(err.message);
                clearResultsDisplay();
            }
        }
        async function visualiseResults() {
            try {
                if (!calculatedState) {
                    await calculateResults(true);
                } else {
                    if (window.location.protocol.startsWith('http')) {
                        metricsGraphContainer.style.display = 'block';
                        metricsGraphFallback.style.display = 'none';
                    } else {
                        metricsGraphContainer.style.display = 'none';
                        metricsGraphFallback.style.display = 'block';
                    }
                }
            } catch (err) {
                showError(err.message);
            }
        }
        function clearResultsDisplay() {
            eqDisplay.textContent = '—';
            maeVal.textContent = '—';
            mseVal.textContent = '—';
            rmseVal.textContent = '—';
            r2Val.textContent = '—';
            calculatedState = null;
            metricsGraphContainer.style.display = 'none';
            metricsGraphFallback.style.display = 'none';
            metricsGraphImg.removeAttribute('src');
        }
        function resetAll() {
            xInput.value = '';
            yInput.value = '';
            hideError();
            clearResultsDisplay();
        }
    </script>
</body>
</html>
