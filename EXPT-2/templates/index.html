<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Linear Regression Calculator</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --input-focus: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .row-container {
            display: grid;
            grid-template-columns: 40px 180px 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 12px;
        }

        .row-index {
            font-weight: 600;
            color: var(--text-muted);
            text-align: right;
        }

        .input-box {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.9rem;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.15s ease;
        }

        .input-box:focus {
            border-color: var(--input-focus);
        }

        .input-helper {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }

        .actions-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        button {
            border: none;
            outline: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            padding: 10px 16px;
            transition: all 0.15s ease;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #334155;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .row-container {
                grid-template-columns: 1fr;
                gap: 8px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 12px;
            }
            .row-index {
                text-align: left;
            }
            .actions-wrapper {
                flex-direction: column;
                gap: 12px;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Multiple Linear Regression</h1>
            <p>Compute coefficients, evaluate performance metrics, and predict values</p>
        </div>
        
        <form action="/calculate" method="POST">
            <div class="section">
                <h3 class="section-title">Target Variable (y)</h3>
                <div class="row-container">
                    <div class="row-index">y:</div>
                    <input type="text" name="y_name" class="input-box" placeholder="Target Name" required>
                    <div>
                        <input type="text" name="y_values" class="input-box" placeholder="Values (comma-separated, e.g. 10, 20, 30)" required>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3 class="section-title">Feature Variables (x)</h3>
                <div id="features-wrapper">
                    <div class="row-container">
                        <span class="row-index">x1:</span>
                        <input type="text" name="x_name_0" class="input-box" placeholder="Feature Name" required>
                        <input type="text" name="x_values_0" class="input-box" placeholder="Values (comma-separated, e.g. 1, 2, 3)" required>
                    </div>
                </div>
            </div>

            <div class="actions-wrapper">
                <button type="button" class="btn-secondary" onclick="addFeatureRow()">+ Add Feature</button>
                <button type="submit" class="btn-primary">Calculate Regression</button>
            </div>
        </form>
    </div>

    <script>
        let featureCount = 1;
        function addFeatureRow() {
            const wrapper = document.getElementById('features-wrapper');
            const newRow = document.createElement('div');
            newRow.className = 'row-container';
            newRow.innerHTML = `
                <span class="row-index">x${featureCount + 1}:</span>
                <input type="text" name="x_name_${featureCount}" class="input-box" placeholder="Feature Name" required>
                <input type="text" name="x_values_${featureCount}" class="input-box" placeholder="Values" required>
            `;
            wrapper.appendChild(newRow);
            featureCount++;
        }
    </script>
</body>
</html>
